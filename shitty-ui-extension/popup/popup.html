<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shitty UI</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 14px 16px 16px;
        font-family: system-ui, Segoe UI, sans-serif;
        font-size: 13px;
        color: #1a1a1a;
        background: #f4f2ff;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p.lead {
        margin: 0 0 14px;
        color: #5b5568;
        line-height: 1.35;
        font-size: 12px;
      }
      label.row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 0;
        border-top: 1px solid rgba(0, 0, 0, 0.06);
        cursor: pointer;
      }
      label.row:first-of-type {
        border-top: none;
      }
      input[type="checkbox"] {
        margin-top: 2px;
        accent-color: #6d28d9;
      }
      .row span {
        line-height: 1.35;
      }
      .row strong {
        display: block;
        font-size: 12px;
        margin-bottom: 2px;
      }
      .row small {
        color: #6b6578;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>Shitty UI Injector</h1>
    <p class="lead">Reload tabs after toggling. The plate is <code>color-blind.png</code>; set <code>COLORBLIND_EXPECTED</code> in captcha-buttons.js to match what it shows.</p>

    <label class="row">
      <input type="checkbox" id="captchaButtons" />
      <span>
        <strong>Captcha every button</strong>
        <small>Seven steps: type → color plate → target dice → broke slots → ad puzzle → key QTE → GO click.</small>
      </span>
    </label>

    <script src="popup.js"></script>
  </body>
</html>
